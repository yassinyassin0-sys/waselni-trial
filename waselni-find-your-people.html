<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="dark-content">
  <title>waselni-find-your-people</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; }
    body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }

    .page { width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; background: #E8DFC8; }
    .phone { width: 402px; height: 874px; border-radius: 52px; overflow: hidden; position: relative; flex-shrink: 0; background: #F0E8D5; display: flex; flex-direction: column; }
    @media (max-width: 430px) { .phone { width: 100vw; height: 100vh; border-radius: 0; } }

    /* Status bar */
    .statusbar { position: absolute; top: 0; left: 0; right: 0; height: 54px; display: flex; align-items: center; justify-content: space-between; margin-top: 8px; z-index: 100; pointer-events: none; }
    .di { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 126px; height: 37px; background: #000; border-radius: 20px; z-index: 20; }
    .sb-zone { width: 138px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .sb-mid { width: 126px; flex-shrink: 0; }
    .sb-time { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; color: rgba(0,0,0,0.85); }
    .sb-icons { display: flex; align-items: center; gap: 7px; }

    /* Content */
    .content { flex: 1; overflow-y: auto; padding: 82px 24px 60px; -webkit-overflow-scrolling: touch; }

    /* Back button */
    .back-btn { width: 36px; height: 36px; border-radius: 10px; background: rgba(42,26,4,0.07); border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 20px; transition: background 0.15s; -webkit-tap-highlight-color: transparent; }
    .back-btn:active { background: rgba(42,26,4,0.12); }

    /* Header */
    .page-eyebrow { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(42,26,4,0.4); font-weight: 400; margin-bottom: 10px; }
    .page-title { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 34px; line-height: 1.05; letter-spacing: -0.02em; color: #18102E; margin-bottom: 8px; }
    .page-subtitle { font-size: 13px; font-weight: 400; color: rgba(42,26,4,0.6); line-height: 1.6; margin-bottom: 24px; }

    /* Section label */
    .section-label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(42,26,4,0.4); font-weight: 400; margin-bottom: 14px; }

    /* Suggestion chips */
    .chips-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .chip { background: rgba(42,26,4,0.05); border: 0.5px solid rgba(42,26,4,0.12); border-radius: 100px; padding: 9px 16px; font-size: 13px; font-weight: 400; color: rgba(42,26,4,0.7); cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s; -webkit-tap-highlight-color: transparent; }
    .chip:active { transform: scale(0.97); }
    .chip.selected { background: #2A1545; border-color: transparent; color: #F0E8D5; }

    /* Divider */
    .divider { height: 0.5px; background: rgba(42,26,4,0.1); margin: 0 0 20px; }

    /* Custom input */
    .input-wrapper { position: relative; margin-bottom: 20px; }
    .text-input { width: 100%; padding: 12px 14px; border: 0.5px solid rgba(42,26,4,0.15); border-radius: 12px; font-size: 14px; font-weight: 400; font-family: 'DM Sans', sans-serif; background: rgba(42,26,4,0.03); color: rgba(42,26,4,0.88); outline: none; -webkit-appearance: none; transition: border-color 0.2s, background 0.2s; padding-right: 72px; }
    .text-input:focus { border-color: #3D1E5E; background: white; }
    .text-input::placeholder { color: rgba(42,26,4,0.3); }
    .input-add-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); height: 30px; padding: 0 12px; background: #3D1E5E; color: #F0E8D5; border: none; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 400; cursor: pointer; opacity: 0; pointer-events: none; transition: opacity 0.15s; }
    .input-add-btn.active { opacity: 1; pointer-events: all; }

    /* Selected tags */
    .selected-section { margin-bottom: 24px; display: none; }
    .selected-label { font-size: 11px; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(42,26,4,0.4); font-weight: 400; margin-bottom: 12px; }
    .tags-row { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-pill { display: inline-flex; align-items: center; gap: 6px; background: #2A1545; color: #F0E8D5; padding: 6px 12px; border-radius: 100px; font-size: 13px; font-weight: 400; animation: tagIn 0.2s ease-out; }
    @keyframes tagIn { from { opacity: 0; transform: scale(0.85); } to { opacity: 1; transform: scale(1); } }
    .tag-remove { background: rgba(240,232,213,0.25); border: none; color: #F0E8D5; width: 16px; height: 16px; border-radius: 50%; font-size: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; padding: 0; transition: background 0.15s; }
    .tag-remove:active { background: rgba(240,232,213,0.4); }

    /* Continue button */
    .continue-btn { width: 100%; height: 52px; background: #3D1E5E; color: #F0E8D5; border: none; border-radius: 14px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; transition: opacity 0.15s; margin-bottom: 20px; }
    .continue-btn:disabled { opacity: 0.3; pointer-events: none; }
    .continue-btn:not(:disabled):active { opacity: 0.85; }

    /* Home indicator */
    .home-indicator { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 134px; height: 5px; background: rgba(42,26,4,0.14); border-radius: 3px; z-index: 10; }
  </style>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="waselni-taxonomy.js"></script>
  <script src="waselni-matching.js"></script>
  <script src="waselni-data.js"></script>
  <script src="waselni-trial.js"></script>
</head>
<body>
<div class="page">
<div class="phone">

  <div class="statusbar">
    <div class="di"></div>
    <div class="sb-zone"><span class="sb-time">9:41</span></div>
    <div class="sb-mid"></div>
    <div class="sb-zone">
      <div class="sb-icons">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="none"><rect x="0" y="8" width="3" height="4" rx="0.5" fill="rgba(0,0,0,0.85)"/><rect x="4.5" y="5.5" width="3" height="6.5" rx="0.5" fill="rgba(0,0,0,0.85)"/><rect x="9" y="3" width="3" height="9" rx="0.5" fill="rgba(0,0,0,0.85)"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" fill="rgba(0,0,0,0.85)"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none"><path d="M8 9.5C8.69 9.5 9.25 10.06 9.25 10.75S8.69 12 8 12 6.75 11.44 6.75 10.75 7.31 9.5 8 9.5z" fill="rgba(0,0,0,0.85)"/><path d="M8 6.5C9.38 6.5 10.63 7.06 11.54 7.97L12.6 6.9C11.4 5.72 9.78 5 8 5s-3.4.72-4.6 1.9l1.06 1.07C5.37 7.06 6.62 6.5 8 6.5z" fill="rgba(0,0,0,0.85)"/><path d="M8 3C10.42 3 12.62 4 14.24 5.62L15.3 4.55C13.39 2.66 10.82 1.5 8 1.5S2.61 2.66.7 4.55l1.06 1.07C3.38 4 5.58 3 8 3z" fill="rgba(0,0,0,0.85)"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="rgba(0,0,0,0.35)"/><rect x="2" y="2" width="15" height="8" rx="2" fill="rgba(0,0,0,0.85)"/><path d="M23 4C23.83 4.3 24.5 5.08 24.5 6S23.83 7.7 23 8V4z" fill="rgba(0,0,0,0.35)"/></svg>
      </div>
    </div>
  </div>

  <div class="content">

    <button class="back-btn" onclick="goBack()">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><path d="M11 4L6 9l5 5" stroke="rgba(42,26,4,0.7)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>

    <div class="page-eyebrow" id="stepLabel">Step 5 of 5</div>
    <div class="page-title">Find your people.</div>
    <div class="page-subtitle">Who do you want to share your commute with? Select from the suggestions or add your own.</div>

    <!-- Suggested chips -->
    <div class="section-label">Suggested for you — Choose up to 5</div>
    <div class="chips-grid" id="chipsGrid"></div>

    <div class="divider"></div>

    <!-- Add your own -->
    <div class="section-label">Or add your own</div>
    <div class="input-wrapper">
      <input type="text" class="text-input" id="customInput"
        placeholder="e.g. Architects, Startup founders…"
        oninput="toggleAddBtn()"
        onkeydown="handleKey(event)">
      <button class="input-add-btn" id="addBtn" onclick="addCustom()">Add</button>
    </div>

    <!-- Selected -->
    <div class="selected-section" id="selectedSection">
      <div class="selected-label">Your selection</div>
      <div class="tags-row" id="tagsRow"></div>
    </div>

    <button class="continue-btn" id="continueBtn" onclick="continueToNext()" disabled>
      Continue
    </button>

  </div>

  <div class="home-indicator"></div>
</div>
</div>

<script>
  const userRole = localStorage.getItem('waselni_role') || 'passenger';
  const totalSteps = (userRole === 'driver' || userRole === 'both') ? 6 : 5;
  document.getElementById('stepLabel').textContent = 'Step 5 of ' + totalSteps;

  const profileData = JSON.parse(localStorage.getItem('waselni_profile') || '{}');
  const jobTitles = profileData.jobTitles || [];
  const jobTitle = jobTitles[0] || 'default';

  // Career map — max 10 suggestions shown
  const careerMap = {
    'product manager':    ['Engineers', 'Designers', 'Data Analysts', 'Marketing Managers', 'Project Managers', 'Researchers', 'Copywriters', 'Brand Strategists', 'Tech Leads', 'Entrepreneurs'],
    'software engineer':  ['Product Managers', 'DevOps Engineers', 'Data Scientists', 'UI/UX Designers', 'Tech Leads', 'Architects', 'Security Engineers', 'Mobile Developers', 'CTOs', 'Researchers'],
    'designer':           ['Product Managers', 'Engineers', 'Creative Directors', 'Copywriters', 'Researchers', 'Photographers', 'Motion Designers', 'Brand Strategists', 'Illustrators', 'Art Directors'],
    'ux designer':        ['Product Managers', 'Engineers', 'Researchers', 'Creative Directors', 'Copywriters', 'Data Analysts', 'Brand Strategists', 'Motion Designers', 'Content Strategists', 'Illustrators'],
    'data analyst':       ['Product Managers', 'Data Scientists', 'Engineers', 'Business Analysts', 'Marketing Managers', 'Financial Analysts', 'Researchers', 'Strategists', 'Operations Managers', 'Economists'],
    'data scientist':     ['Product Managers', 'Engineers', 'ML Engineers', 'Researchers', 'Data Analysts', 'AI Specialists', 'Statisticians', 'Business Analysts', 'CTOs', 'Academics'],
    'director':           ['Producers', 'Cinematographers', 'Screenwriters', 'Editors', 'Casting Directors', 'Stylists', 'Composers', 'Production Designers', 'DOPs', 'Actors'],
    'producer':           ['Directors', 'Editors', 'Screenwriters', 'Cinematographers', 'Production Managers', 'Sound Designers', 'Composers', 'PR Managers', 'Distributors', 'Investors'],
    'entrepreneur':       ['Investors', 'Mentors', 'Co-founders', 'Advisors', 'VCs', 'Product Managers', 'Engineers', 'Lawyers', 'Marketing Managers', 'Strategists'],
    'consultant':         ['Business Analysts', 'Project Managers', 'Strategy Managers', 'Researchers', 'Lawyers', 'Financial Analysts', 'Operations Managers', 'HR Managers', 'Data Analysts', 'Economists'],
    'accountant':         ['Financial Analysts', 'CFOs', 'Tax Advisors', 'Auditors', 'Business Consultants', 'Lawyers', 'Operations Managers', 'Investment Analysts', 'Economists', 'Actuaries'],
    'marketing manager':  ['Content Creators', 'Graphic Designers', 'Social Media Managers', 'Sales Managers', 'Brand Strategists', 'Copywriters', 'PR Managers', 'Researchers', 'Data Analysts', 'Media Buyers'],
    'sales manager':      ['Marketing Managers', 'Business Developers', 'Account Managers', 'Brand Strategists', 'Operations Managers', 'Product Managers', 'Customer Success Managers', 'Researchers', 'Advisors', 'Consultants'],
    'doctor':             ['Nurses', 'Pharmacists', 'Medical Researchers', 'Specialists', 'Hospital Administrators', 'Therapists', 'Radiologists', 'Surgeons', 'Academics', 'Public Health Experts'],
    'nurse':              ['Doctors', 'Pharmacists', 'Medical Technicians', 'Healthcare Administrators', 'Therapists', 'Radiologists', 'Patient Coordinators', 'Social Workers', 'Researchers', 'Specialists'],
    'teacher':            ['Education Consultants', 'Curriculum Developers', 'Principals', 'Researchers', 'Academics', 'Psychologists', 'Social Workers', 'Librarians', 'Authors', 'Policy Makers'],
    'architect':          ['Engineers', 'Interior Designers', 'Urban Planners', 'Project Managers', 'Surveyors', 'Landscape Architects', 'Contractors', 'Developers', 'Designers', 'Consultants'],
    'lawyer':             ['Consultants', 'Business Analysts', 'Policy Advisors', 'Judges', 'Notaries', 'Researchers', 'Compliance Officers', 'HR Managers', 'Investment Analysts', 'Entrepreneurs'],
    'photographer':       ['Directors', 'Art Directors', 'Stylists', 'Editors', 'Producers', 'Models', 'Designers', 'Creative Directors', 'Curators', 'Writers'],
    'default':            ['Entrepreneurs', 'Creatives', 'Strategists', 'Researchers', 'Consultants', 'Designers', 'Engineers', 'Producers', 'Advisors', 'Mentors']
  };

  function getSuggestions() {
    const t = jobTitle.toLowerCase();
    for (let key in careerMap) {
      if (key !== 'default' && (t.includes(key) || key.includes(t))) return careerMap[key];
    }
    return careerMap['default'];
  }

  const suggestions = getSuggestions().slice(0, 10);
  const grid = document.getElementById('chipsGrid');
  let selected = new Set();

  suggestions.forEach(s => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = s;
    chip.onclick = () => toggleChip(s, chip);
    grid.appendChild(chip);
  });

  const MAX_SELECTIONS = 5;

  function toggleChip(val, chip) {
    if (selected.has(val)) {
      selected.delete(val);
      chip.classList.remove('selected');
    } else {
      if (selected.size >= MAX_SELECTIONS) return;
      selected.add(val);
      chip.classList.add('selected');
    }
    renderSelected();
  }

  function toggleAddBtn() {
    const v = document.getElementById('customInput').value.trim();
    document.getElementById('addBtn').classList.toggle('active', v.length > 0);
  }

  function handleKey(e) {
    if (e.key === 'Enter') { e.preventDefault(); addCustom(); }
  }

  function addCustom() {
    const inp = document.getElementById('customInput');
    const v = inp.value.trim();
    if (!v || selected.size >= MAX_SELECTIONS) return;
    selected.add(v);
    inp.value = '';
    toggleAddBtn();
    renderSelected();
  }

  function removeSelected(val) {
    selected.delete(val);
    document.querySelectorAll('.chip').forEach(c => {
      if (c.textContent === val) c.classList.remove('selected');
    });
    renderSelected();
  }

  function renderSelected() {
    const section = document.getElementById('selectedSection');
    const row = document.getElementById('tagsRow');
    section.style.display = selected.size > 0 ? 'block' : 'none';
    row.innerHTML = Array.from(selected).map(v =>
      '<div class="tag-pill">' + v + '<button class="tag-remove" onclick="removeSelected(\'' + v.replace(/'/g, "\\'") + '\')">×</button></div>'
    ).join('');
    document.getElementById('continueBtn').disabled = selected.size === 0;
  }

  function continueToNext() {
    const profile = JSON.parse(localStorage.getItem('waselni_profile') || '{}');
    profile.preferences = Array.from(selected);
    localStorage.setItem('waselni_profile', JSON.stringify(profile));
    if (userRole === 'driver' || userRole === 'both') {
      window.location.href = 'waselni-driver-verification.html';
    } else {
      window.location.href = 'waselni-home.html';
    }
  }

  function goBack() {
    window.location.href = 'waselni-interests.html';
  }
</script>
</body>
</html>
