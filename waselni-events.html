<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>waselni-events</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; width: 100%; overflow: hidden; position: fixed; }
    body { font-family: 'DM Sans', sans-serif; background: #E8DFC8; display: flex; align-items: center; justify-content: center; }
    .phone { width: 402px; height: 874px; border-radius: 52px; background: #F0E8D5; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; flex-shrink: 0; }
    .label { font-family: 'Instrument Serif', serif; font-style: italic; font-size: 34px; color: #2A1545; }
    .sub { font-size: 13px; color: rgba(42,26,4,0.5); }
    .back { margin-top: 32px; padding: 12px 28px; background: #2A1545; color: #F0E8D5; border: none; border-radius: 12px; font-family: 'DM Sans', sans-serif; font-size: 14px; cursor: pointer; }
    @media (max-width: 430px) { .phone { width: 100vw; height: 100vh; border-radius: 0; } }
  </style>
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="waselni-data.js"></script>
</head>
<body>
<div class="phone">
  <div class="label">Events</div>
  <div class="sub">Coming soon</div>
  <button class="back" onclick="window.location.href='waselni-home.html'">← Back to Home</button>
</div>
</body>
</html>
